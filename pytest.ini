[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
norecursedirs =
    .git
    .venv
    __pycache__
    tests/manual
    tests/scripts
addopts =
    --strict-markers
    --tb=short
markers =
    slow: marks tests as slow
    api: marks tests that exercise external APIs
    data: marks tests that require project data
    integration: marks integration tests
    unit: marks isolated unit tests
