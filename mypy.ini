[mypy]
# Ignore missing stubs warnings for third-party packages
ignore_missing_imports = True

# Allow implicit optional (e.g. service: WatchlistService = None)
no_implicit_optional = False

# Loosen strictness for untyped functions
disallow_untyped_defs = False
disallow_incomplete_defs = False

# Turn off strict untyped checker rules
check_untyped_defs = False

# Ignore GUI type checking noise since PySide6 utilizes dynamic runtime aliases
[mypy-ui_qt.*]
ignore_errors = True
